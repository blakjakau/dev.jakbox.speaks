<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speax Weather</title>
    <link rel="stylesheet" href="/tool-shared.css">
    <style>
        .history-panel {
            width: 250px;
            background: var(--surface);
            border-right: 1px solid var(--outline);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .results-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }
        .weather-card {
            background: var(--surface);
            border: 1px solid var(--outline);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--outline);
            padding-bottom: 10px;
        }
        .weather-location {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }
        .weather-current {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .temp-large {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .condition-text {
            font-size: 1.2rem;
            color: var(--on-surface-medium);
        }
        
        .history-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--outline);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .history-item:hover { background: var(--surface-variant); }
        .history-item.active { border-left: 3px solid var(--primary); background: var(--glass); }
        
        #settings-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }
        .forecast-day {
            background: var(--surface-variant);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body class="tool-content">
    <div id="login-section" class="header hidden">
        <h1>Auth Required</h1>
        <button class="primary" onclick="window.location.href='/auth/login?client=tool'">Login with Google</button>
    </div>

    <div class="header" id="tool-header">
        <h1><span class="badge">Weather</span></h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div class="status-indicator">
                <div id="status-dot" class="dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </div>
    </div>

    <div class="tool-body">
        <div class="input-group" style="padding: 10px 20px; border-bottom: 1px solid var(--outline); margin-bottom: 0;">
            <input type="text" id="manual-query" placeholder="Enter location...">
            <input type="number" id="manual-days" placeholder="Days" value="1" min="1" max="14" style="width: 80px;">
            <button id="manual-search-btn" class="primary">Get Weather</button>
            <button class="btn-icon" id="loc-btn" title="Use current location" style="margin-left:5px">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
            </button>
            <button class="btn-icon" id="settings-open-btn" title="Settings" style="margin-left:5px">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
        <div class="tool-main" style="padding: 0;">
            <div class="history-panel">
                <div style="padding: 10px; font-weight: 600; color: var(--secondary); border-bottom: 1px solid var(--outline);">History</div>
                <div id="history-list" class="list" style="overflow-y: auto;"></div>
            </div>
            <div class="results-panel">
                <div id="results-container">
                    <div style="text-align: center; color: var(--on-surface-medium); margin-top: 50px;">
                        No weather data yet.
                    </div>
                </div>
            </div>
        </div>
        <div id="logs" class="logs"></div>
    </div>

    <div id="settings-modal">
        <div class="card" style="width: 400px;">
            <h2>Weather Settings</h2>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label style="font-size: 0.8rem; color: var(--on-surface-medium);">WeatherAPI Key (<a href="https://www.weatherapi.com/" target="_blank">Get one</a>)</label>
                    <input type="text" id="weather-key-input" placeholder="WeatherAPI Key">
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                    <button class="secondary" onclick="document.getElementById('settings-modal').style.display='none'">Cancel</button>
                    <button class="primary" id="settings-save-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { SpeaxToolClient } from '/speax-tool-client.mjs';
        import { checkAuth, setupStatusIndicator, createLogger } from '/tool-shared.mjs';

        const logger = createLogger('logs');
        const historyList = document.getElementById('history-list');
        const resultsContainer = document.getElementById('results-container');
        const manualInput = document.getElementById('manual-query');
        const manualDays = document.getElementById('manual-days');
        const manualBtn = document.getElementById('manual-search-btn');
        const locBtn = document.getElementById('loc-btn');
        const settingsModal = document.getElementById('settings-modal');
        const settingsOpenBtn = document.getElementById('settings-open-btn');
        const settingsSaveBtn = document.getElementById('settings-save-btn');

        if (window.parent !== window) document.getElementById('tool-header').classList.add('hidden');
        if (!checkAuth()) document.getElementById('login-section').classList.remove('hidden');

        let weatherHistory = JSON.parse(localStorage.getItem('speax_weather_history') || '[]');
        const ONE_HOUR = 60 * 60 * 1000;
        weatherHistory = weatherHistory.filter(h => (Date.now() - h.timestamp) < ONE_HOUR);
        localStorage.setItem('speax_weather_history', JSON.stringify(weatherHistory));
        let apiKey = localStorage.getItem('weatherapi_key') || '';

        function renderHistory() {
            historyList.innerHTML = '';
            weatherHistory.forEach((h, i) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const timeStr = new Date(h.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <div style="font-weight: 600;">${h.location}</div>
                            <div style="font-size: 0.75rem; color: var(--on-surface-medium); margin-top: 2px;">
                                ${timeStr}
                            </div>
                        </div>
                        <button class="btn-icon delete" onclick="deleteHistory(${i}, event)" style="padding: 2px; margin: -5px -5px 0 0;" title="Delete">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"></path></svg>
                        </button>
                    </div>
                `;
                div.onclick = () => showResults(i);
                historyList.appendChild(div);
            });
        }
        
        window.deleteHistory = (index, event) => {
            event.stopPropagation();
            weatherHistory.splice(index, 1);
            localStorage.setItem('speax_weather_history', JSON.stringify(weatherHistory));
            renderHistory();
            if (weatherHistory.length > 0) showResults(0);
            else resultsContainer.innerHTML = `<div style="text-align: center; color: var(--on-surface-medium); margin-top: 50px;">No weather data yet.</div>`;
        };

        function showResults(index) {
            const h = weatherHistory[index];
            if (!h) return;
            Array.from(historyList.children).forEach((child, i) => child.classList.toggle('active', i === index));
            
            const data = h.data;
            if (data.error) {
                 resultsContainer.innerHTML = `<div style="color:var(--error); padding:20px;">Error: ${data.error.message}</div>`;
                 return;
            }

            let forecastHtml = '';
            if (data.forecast && data.forecast.forecastday) {
                forecastHtml = `
                    <div style="margin-top:20px;">
                        <h3 style="margin-bottom:10px;">Forecast</h3>
                        <div class="forecast-grid">
                            ${data.forecast.forecastday.map(day => `
                                <div class="forecast-day">
                                    <div style="font-weight:600;">${new Date(day.date_epoch * 1000).toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'})}</div>
                                    <img src="${day.day.condition.icon}" alt="${day.day.condition.text}" style="width:48px;height:48px;">
                                    <div><span style="color:var(--error);">${day.day.maxtemp_c}°C</span> / <span style="color:var(--info);">${day.day.mintemp_c}°C</span></div>
                                    <div style="font-size:0.8rem; color:var(--on-surface-medium);">${day.day.condition.text}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            resultsContainer.innerHTML = `
                <div class="weather-card">
                    <div class="weather-header">
                        <div class="weather-location">${data.location.name}, ${data.location.country}</div>
                        <div style="color:var(--on-surface-medium);">${data.location.localtime}</div>
                    </div>
                    <div class="weather-current">
                        <img src="${data.current.condition.icon}" alt="${data.current.condition.text}" style="width:64px;height:64px;">
                        <div>
                            <div class="temp-large">${data.current.temp_c}°C</div>
                            <div class="condition-text">${data.current.condition.text}</div>
                        </div>
                        <div style="margin-left: auto; text-align:right; color:var(--on-surface-medium); line-height: 1.5;">
                            <div>Feels like: ${data.current.feelslike_c}°C</div>
                            <div>Humidity: ${data.current.humidity}%</div>
                            <div>Wind: ${data.current.wind_kph} km/h</div>
                        </div>
                    </div>
                    ${forecastHtml}
                </div>
            `;
        }

        async function fetchWeather(location, days) {
            if (!apiKey) {
                const msg = "WeatherAPI Key not set. Please configure it in settings.";
                logger.log(msg, 'error');
                throw new Error(msg);
            }
            
            const cachedIdx = weatherHistory.findIndex(h => 
                h.location.toLowerCase() === location.toLowerCase() && 
                h.days === days && 
                (Date.now() - h.timestamp) < ONE_HOUR
            );

            if (cachedIdx !== -1) {
                logger.log(`Using cached weather for: "${location}"...`);
                const item = weatherHistory.splice(cachedIdx, 1)[0];
                weatherHistory.unshift(item);
                localStorage.setItem('speax_weather_history', JSON.stringify(weatherHistory));
                renderHistory();
                showResults(0);
                return item.data;
            }

            logger.log(`Fetching weather for: "${location}"...`);
            try {
                const url = `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${encodeURIComponent(location)}&days=${days}&aqi=no`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const item = { location, days, timestamp: Date.now(), data };
                weatherHistory = [item, ...weatherHistory.slice(0, 19)]; // Keep last 20
                localStorage.setItem('speax_weather_history', JSON.stringify(weatherHistory));
                renderHistory();
                showResults(0);
                
                return data;
            } catch (err) {
                logger.log(`Error: ${err.message}`, 'error');
                throw err;
            }
        }

        manualBtn.onclick = () => {
            const loc = manualInput.value.trim();
            const days = parseInt(manualDays.value) || 1;
            if (loc) fetchWeather(loc, days).catch(() => {});
        };

        locBtn.onclick = () => {
            if (navigator.geolocation) {
                locBtn.style.opacity = '0.5';
                navigator.geolocation.getCurrentPosition((position) => {
                    locBtn.style.opacity = '1';
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    manualInput.value = `${lat},${lon}`;
                    manualBtn.onclick();
                }, (err) => {
                    locBtn.style.opacity = '1';
                    logger.log(`Geolocation error: ${err.message}`, 'error');
                });
            } else {
                logger.log('Geolocation not supported by this browser.', 'error');
            }
        };

        manualInput.onkeypress = (e) => { if (e.key === 'Enter') manualBtn.onclick(); };
        manualDays.onkeypress = (e) => { if (e.key === 'Enter') manualBtn.onclick(); };

        settingsOpenBtn.onclick = () => {
            document.getElementById('weather-key-input').value = apiKey;
            settingsModal.style.display = 'flex';
        };

        settingsSaveBtn.onclick = () => {
            apiKey = document.getElementById('weather-key-input').value.trim();
            localStorage.setItem('weatherapi_key', apiKey);
            settingsModal.style.display = 'none';
        };

        const client = new SpeaxToolClient(window.location.origin, 'WeatherTool');
        setupStatusIndicator(client, 'status-dot', 'status-text');

        client.registerAction('get_weather', 'Get current weather and forecast for a location.', {
            type: 'object', 
            properties: { 
                location: { type: 'string', description: 'City name, zip code, or latitude,longitude (e.g. 48.85,2.35).' },
                days: { type: 'number', description: 'Number of days of forecast (1-14).' }
            }, 
            required: ['location']
        }, async (p) => {
            const days = p.days || 1;
            const data = await fetchWeather(p.location, days);
            
            return { 
                location: `${data.location.name}, ${data.location.region}, ${data.location.country}`,
                current: {
                    temp_c: data.current.temp_c,
                    temp_f: data.current.temp_f,
                    condition: data.current.condition.text,
                    feelslike_c: data.current.feelslike_c,
                    humidity: data.current.humidity,
                    wind_kph: data.current.wind_kph
                },
                forecast: data.forecast ? data.forecast.forecastday.map(d => ({
                    date: d.date,
                    maxtemp_c: d.day.maxtemp_c,
                    mintemp_c: d.day.mintemp_c,
                    condition: d.day.condition.text
                })) : []
            };
        });

        client.connect();
        renderHistory();
        if (weatherHistory.length > 0) showResults(0);
    </script>
</body>
</html>
